name: Vincent QC WakaTime README
description: Update this repository's README with WakaTime metrics via a local wrapper action.

inputs:
  WAKATIME_API_KEY:
    description: WakaTime API key used to fetch coding activity.
    required: true

runs:
  using: composite
  steps:
    - name: Wait for WakaTime stats to be ready
      shell: bash
      env:
        WAKATIME_API_KEY: ${{ inputs.WAKATIME_API_KEY }}
        TIME_RANGE: all_time
        API_BASE_URL: https://wakatime.com/api
      run: python3 "${{ github.action_path }}/scripts/wait_for_wakatime.py"

    - name: Update README metrics
      uses: athul/waka-readme@master
      with:
        WAKATIME_API_KEY: ${{ inputs.WAKATIME_API_KEY }}
        REPOSITORY: vincent-qc/vincent-qc
        SECTION_NAME: waka
        BLOCKS: .*#
        SHOW_TITLE: true
        TIME_RANGE: all_time
        LANG_COUNT: 8
        SHOW_TIME: true
        SHOW_TOTAL: true
        TARGET_BRANCH: main
        TARGET_PATH: README.md
